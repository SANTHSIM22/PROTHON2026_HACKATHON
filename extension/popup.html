<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>Actify</title>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-container">
    <div class="logo">Actify</div>
    <div id="error-message" class="error"></div>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log in</button>
    </form>
    <p class="subtext">Use your existing platform credentials.</p>
  </div>

  <!-- USER -->
  <div id="user-container" class="hidden">
    <div class="top-bar">
      <div class="user-info">
        <span id="user-name" class="name"></span>
        <span id="user-role" class="badge"></span>
      </div>
      <button id="logout-btn" class="logout">Log out</button>
    </div>

    <div class="divider"></div>

    <div class="record-section">
      <div id="recording-visualizer" class="waveform hidden">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>
      <p id="recording-status" class="status">Ready indicator</p>
      <button id="record-btn">Start Recording</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
