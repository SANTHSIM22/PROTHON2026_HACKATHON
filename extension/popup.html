<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <title>MeetRec</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 400px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
    }

    #root {
      width: 320px;
      min-height: 400px;
    }

    /* Pulsing red dot */
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Audio waveform bars */
    @keyframes waveform1 {
      0%, 100% { height: 8px; }
      50% { height: 28px; }
    }
    @keyframes waveform2 {
      0%, 100% { height: 14px; }
      50% { height: 36px; }
    }
    @keyframes waveform3 {
      0%, 100% { height: 20px; }
      50% { height: 12px; }
    }
    @keyframes waveform4 {
      0%, 100% { height: 10px; }
      50% { height: 32px; }
    }
    @keyframes waveform5 {
      0%, 100% { height: 16px; }
      50% { height: 24px; }
    }

    .waveform-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 44px;
      margin: 12px 0;
    }

    .waveform-bar {
      width: 4px;
      background: #6366f1;
      border-radius: 2px;
      animation-duration: 1s;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }

    .waveform-bar:nth-child(1) { animation-name: waveform1; animation-delay: 0s; }
    .waveform-bar:nth-child(2) { animation-name: waveform2; animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { animation-name: waveform3; animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { animation-name: waveform4; animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { animation-name: waveform1; animation-delay: 0.15s; }
    .waveform-bar:nth-child(6) { animation-name: waveform5; animation-delay: 0.25s; }
    .waveform-bar:nth-child(7) { animation-name: waveform2; animation-delay: 0.05s; }
    .waveform-bar:nth-child(8) { animation-name: waveform3; animation-delay: 0.35s; }
    .waveform-bar:nth-child(9) { animation-name: waveform4; animation-delay: 0.12s; }
    .waveform-bar:nth-child(10) { animation-name: waveform1; animation-delay: 0.28s; }
    .waveform-bar:nth-child(11) { animation-name: waveform5; animation-delay: 0.08s; }
    .waveform-bar:nth-child(12) { animation-name: waveform2; animation-delay: 0.22s; }

    /* Fade in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* Button hover effects */
    .record-btn {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .record-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px rgba(239, 68, 68, 0.4);
    }
    .record-btn:active {
      transform: scale(0.97);
    }

    .stop-btn {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .stop-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px rgba(239, 68, 68, 0.3);
    }
    .stop-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
